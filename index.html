<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One More Sim</title>
    <link rel="stylesheet" href="style.css?v=4">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@100;200;300;400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <!-- TransformControls + OrbitControls (World 5) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- UnrealBloomPass (World 6) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>
    <!-- Landing Page View -->
    <div id="landing-container">

        <!-- Video de fondo en loop -->
        <video id="landing-video" src="assets/03_31_landing.mp4" autoplay loop muted playsinline preload="auto"></video>

        <div id="landing-vignette"></div>

        <!-- UI encima del video -->
        <div id="landing-ui">
            <button id="enter-button-img">
                <img src="assets/buttonEnter.png" alt="Enter" id="enter-btn-img"/>
            </button>
        </div>

    </div>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- UI SHELL — visible after ENTRAR transition      -->
    <!-- ═══════════════════════════════════════════════ -->
    <div id="ui-shell">

        <!-- HEADER HUD — 3-section layout: Logo | Map | Credits -->
        <div id="hud-header">

            <!-- Section 1: LOGO -->
            <div class="header-section" id="header-logo">
                <div id="header-logo-inner">

                    <!-- Imagen de fondo A1.png -->
                    <img src="assets/tex/A1.png"
                         alt="Logo panel"
                         id="header-logo-bg"/>

                    <!-- Contenedor de botones encima de la imagen -->
                    <div id="header-logo-buttons">

                        <!-- Sector 2/3: botón A1button1 -->
                        <div class="header-logo-btn-slot" id="logo-btn-slot-1">
                            <button class="header-logo-btn" id="logo-btn-1">
                                <img src="assets/tex/Buttons/A1button1.png"
                                     alt="Button 1"/>
                            </button>
                        </div>

                        <!-- Sector 3/3: botón A1button2 -->
                        <div class="header-logo-btn-slot" id="logo-btn-slot-2">
                            <button class="header-logo-btn" id="logo-btn-2">
                                <img src="assets/tex/Buttons/A1button2.png"
                                     alt="Button 2"/>
                            </button>
                        </div>

                    </div>
                </div>
            </div>

            <!-- Section 2: MAPA -->
            <div class="header-section" id="header-map">
                <div id="minimap-panel">
                    <div id="parallax-viewport">

                        <!-- Capa 1: textura de fondo, se mueve lento -->
                        <div id="pmap-bg"></div>

                        <!-- Capa 2: mapa RPG, se mueve más rápido -->
                        <div id="pmap-fg"></div>

                        <!-- Capa 3: nodos SVG encima de todo -->
                        <svg id="pmap-nodes-svg"
                             xmlns="http://www.w3.org/2000/svg"
                             style="position:absolute; inset:0; width:100%; height:100%;
                                    pointer-events:none; overflow:visible; z-index:3;">
                        </svg>

                    </div>
                </div>
            </div>

            <!-- Section 3: CREDITS -->
            <div class="header-section" id="header-credits">
                <img src="assets/panel-02.png" alt="Credits" class="header-section-img" />
            </div>

        </div>

        <!-- CHARACTER PANEL -->
        <aside id="character-panel">
            <div id="texture-buttons">
                <button class="texture-btn active" data-texture="0">
                    <img class="btn-normal" src="assets/tex/Buttons/colorB1.png"  alt="Color 1"/>
                    <img class="btn-hover"  src="assets/tex/Buttons/colorBH1.png" alt="Color 1 active"/>
                </button>
                <button class="texture-btn" data-texture="1">
                    <img class="btn-normal" src="assets/tex/Buttons/colorB2.png"  alt="Color 2"/>
                    <img class="btn-hover"  src="assets/tex/Buttons/colorBH2.png" alt="Color 2 active"/>
                </button>
                <button class="texture-btn" data-texture="2">
                    <img class="btn-normal" src="assets/tex/Buttons/colorB3.png"  alt="Color 3"/>
                    <img class="btn-hover"  src="assets/tex/Buttons/colorBH3.png" alt="Color 3 active"/>
                </button>
                <button class="texture-btn" data-texture="3">
                    <img class="btn-normal" src="assets/tex/Buttons/colorB4.png"  alt="Color 4"/>
                    <img class="btn-hover"  src="assets/tex/Buttons/colorBH4.png" alt="Color 4 active"/>
                </button>
                <button class="texture-btn" data-texture="4">
                    <img class="btn-normal" src="assets/tex/Buttons/colorB5.png"  alt="Color 5"/>
                    <img class="btn-hover"  src="assets/tex/Buttons/colorBH5.png" alt="Color 5 active"/>
                </button>
                <button class="texture-btn" data-texture="5">
                    <img class="btn-normal" src="assets/tex/Buttons/colorB6.png"  alt="Color 6"/>
                    <img class="btn-hover"  src="assets/tex/Buttons/colorBH6.png" alt="Color 6 active"/>
                </button>
                <button class="texture-btn" data-texture="6">
                    <img class="btn-normal" src="assets/tex/Buttons/colorB7.png"  alt="Color 7"/>
                    <img class="btn-hover"  src="assets/tex/Buttons/colorBH7.png" alt="Color 7 active"/>
                </button>
                <button class="texture-btn" data-texture="7">
                    <img class="btn-normal" src="assets/tex/Buttons/colorB8.png"  alt="Color 8"/>
                    <img class="btn-hover"  src="assets/tex/Buttons/colorBH8.png" alt="Color 8 active"/>
                </button>
            </div>
            <div id="character-display">
                <img id="character-webp"
                     src="assets/chars/1.webp"
                     alt="Character"
                     class="character-anim" />
            </div>
        </aside>

        <div id="vertical-divider">
            <div class="divider-img-track">
                <img src="assets/panel-06.png" alt="" class="divider-img" />
                <img src="assets/panel-06.png" alt="" class="divider-img" />
                <img src="assets/panel-06.png" alt="" class="divider-img" />
                <img src="assets/panel-06.png" alt="" class="divider-img" />
            </div>
        </div>

        <!-- CUSTOM CURSOR -->
        <div id="custom-cursor"></div>

        <!-- MAIN CANVAS AREA — Three.js canvas is inserted here -->
        <div id="canvas-area">
            <!-- Corner Decorations -->
            <div class="corner-decoration top-left"><svg viewBox="0 0 20 20" width="20" height="20">
                    <path d="M0,20 L0,0 L20,0" fill="none" stroke="currentColor" stroke-width="2" />
                </svg></div>
            <div class="corner-decoration top-right"><svg viewBox="0 0 20 20" width="20" height="20">
                    <path d="M0,0 L20,0 L20,20" fill="none" stroke="currentColor" stroke-width="2" />
                </svg></div>
            <div class="corner-decoration bottom-left"><svg viewBox="0 0 20 20" width="20" height="20">
                    <path d="M0,0 L0,20 L20,20" fill="none" stroke="currentColor" stroke-width="2" />
                </svg></div>
            <div class="corner-decoration bottom-right"><svg viewBox="0 0 20 20" width="20" height="20">
                    <path d="M20,0 L20,20 L0,20" fill="none" stroke="currentColor" stroke-width="2" />
                </svg></div>

            <!-- World Switch Flash Text -->
            <div id="world-flash">01</div>

            <!-- Old carousel-container becomes the canvas mount point -->
            <div id="carousel-container"></div>

            <!-- World 00 overlay: eggBW top-left -->
            <div id="world-00-overlay">
                <img src="assets/BWUI/eggBW.png" id="egg-bw-img" alt=""/>
            </div>
            <div id="text-overlay-container"></div>
            <div id="room-name-display" class="hidden"></div>

            <!-- World Loader — shown during world transitions -->
            <div id="world-loader">
                <div class="loader-spinner"></div>
                <div class="loader-text">INICIANDO SIMULACIÓN...</div>
                <div class="loader-bar-track">
                    <div class="loader-bar-fill"></div>
                </div>
            </div>
        </div>

        <!-- WORLD NAV -->
        <nav id="world-nav">
            <button class="world-btn active" data-world="0" data-btn="1">
                <img src="assets/tex/Buttons/worldBH1.png" alt="01Core_Unit" class="world-btn-img" />
            </button>
            <button class="world-btn" data-world="7" data-btn="2">
                <img src="assets/tex/Buttons/worldB2.png" alt="02Ambient_Human_presence" class="world-btn-img" />
            </button>
            <button class="world-btn" data-world="2" data-btn="3">
                <img src="assets/tex/Buttons/worldB3.png" alt="03Presentation_Club" class="world-btn-img" />
            </button>
            <button class="world-btn" data-world="9" data-btn="4">
                <img src="assets/tex/Buttons/worldB4.png" alt="04Inner_World" class="world-btn-img" />
            </button>
            <button class="world-btn" data-world="6" data-btn="5">
                <img src="assets/tex/Buttons/worldB5.png" alt="05Aqua_Race" class="world-btn-img" />
            </button>
            <button class="world-btn" data-world="3" data-btn="6">
                <img src="assets/tex/Buttons/worldB6.png" alt="06Super_Me_Era" class="world-btn-img" />
            </button>
            <button class="world-btn" data-world="5" data-btn="7">
                <img src="assets/tex/Buttons/worldB7.png" alt="07" class="world-btn-img" />
            </button>
            <button class="world-btn" data-world="4" data-btn="8">
                <img src="assets/tex/Buttons/worldB8.png" alt="08Fetal_Situation" class="world-btn-img" />
            </button>
            <button class="world-btn" data-world="1" data-btn="9">
                <img src="assets/tex/Buttons/worldB9.png" alt="09Bubblepicking" class="world-btn-img" />
            </button>
            <button class="world-btn" data-world="8" data-btn="10">
                <img src="assets/tex/Buttons/worldB10.png" alt="10" class="world-btn-img" />
            </button>
        </nav>

        <div id="hud-footer">
            <!-- FILA SUPERIOR: Spectrogram + World Info Text -->
            <div id="footer-top-row">
                <div id="footer-top-left">
                    <div class="spectrogram-label">AUDIO SPECTRUM</div>
                    <div id="spectrogram-container"></div>
                </div>
                <div id="footer-top-right">
                    <div class="world-info-icon" id="world-info-icon">
                        <svg viewBox="0 0 48 48" id="world-icon-svg">
                            <circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" stroke-width="2" />
                            <circle cx="24" cy="24" r="6" fill="currentColor" />
                        </svg>
                    </div>
                    <div class="world-info-text">
                        <div class="world-info-title" id="world-info-title">CAROUSEL</div>
                        <span class="world-info-desc" id="world-info-desc"></span><span id="world-text-cursor">█</span>
                    </div>
                </div>
            </div>
            <!-- FILA INFERIOR: Minesweepers + Image Panels -->
            <div id="footer-bottom-row">
                <div class="image-panel minesweeper-panel" id="minesweeper-left">
                    <div class="ms-header">
                        <span class="ms-counter" id="ms-left-counter">5</span>
                        <button class="ms-reset" id="ms-left-reset" title="Nuevo juego">⟳</button>
                        <span class="ms-timer" id="ms-left-timer">0</span>
                    </div>
                    <div class="ms-grid" id="ms-left-grid"></div>
                    <div class="ms-status" id="ms-left-status"></div>
                </div>
                <div class="image-panel" id="img-panel-1">
                    <img src="assets/panel-02.png" alt="Panel 2" class="panel-img" />
                    <div class="panel-border-overlay"></div>
                </div>
                <div class="image-panel" id="world-tracker-panel">
                    <div id="world-track-viewport">
                        <div id="world-track-list"></div>
                    </div>
                    <div class="panel-border-overlay"></div>
                </div>
                <div class="image-panel" id="img-panel-3">
                    <img src="assets/panel-04.png" alt="Panel 4" class="panel-img" />
                    <div class="panel-border-overlay"></div>
                </div>
                <div class="image-panel minesweeper-panel" id="minesweeper-right">
                    <div class="ms-header">
                        <span class="ms-counter" id="ms-right-counter">5</span>
                        <button class="ms-reset" id="ms-right-reset" title="Nuevo juego">⟳</button>
                        <span class="ms-timer" id="ms-right-timer">0</span>
                    </div>
                    <div class="ms-grid" id="ms-right-grid"></div>
                    <div class="ms-status" id="ms-right-status"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- World 03 overlay: charBW standing at bottom, centered on character/canvas divider -->
    <div id="world-03-overlay">
        <img src="assets/BWUI/charBW.png" id="char-bw-img" alt=""/>
    </div>

    <!-- Intro Welcome Screen (shown after entering the experience) -->
    <div id="intro-overlay">
        <div id="intro-blur-bg"></div>
        <div id="intro-godrays"></div>
        <div id="intro-center-glow"></div>
        <div id="intro-content">
            <img src="assets/UIText/welcome.png" id="intro-welcome-img" alt="Welcome"/>
            <button id="intro-enter-btn">
                <img src="assets/buttonEnter.png" alt="Enter"/>
            </button>
        </div>
    </div>

    <!-- Mobile: Texture FAB + Drawer -->
    <button id="texture-fab" aria-label="Character textures">
        <span class="fab-swatch"></span>
    </button>
    <div id="texture-drawer-backdrop"></div>
    <div id="texture-drawer">
        <div class="drawer-title">TEXTURAS</div>
        <div class="drawer-grid">
            <button class="texture-btn active" data-texture="0">
                <img class="btn-normal" src="assets/tex/Buttons/colorB1.png"  alt="Color 1"/>
                <img class="btn-hover"  src="assets/tex/Buttons/colorBH1.png" alt="Color 1 active"/>
            </button>
            <button class="texture-btn" data-texture="1">
                <img class="btn-normal" src="assets/tex/Buttons/colorB2.png"  alt="Color 2"/>
                <img class="btn-hover"  src="assets/tex/Buttons/colorBH2.png" alt="Color 2 active"/>
            </button>
            <button class="texture-btn" data-texture="2">
                <img class="btn-normal" src="assets/tex/Buttons/colorB3.png"  alt="Color 3"/>
                <img class="btn-hover"  src="assets/tex/Buttons/colorBH3.png" alt="Color 3 active"/>
            </button>
            <button class="texture-btn" data-texture="3">
                <img class="btn-normal" src="assets/tex/Buttons/colorB4.png"  alt="Color 4"/>
                <img class="btn-hover"  src="assets/tex/Buttons/colorBH4.png" alt="Color 4 active"/>
            </button>
            <button class="texture-btn" data-texture="4">
                <img class="btn-normal" src="assets/tex/Buttons/colorB5.png"  alt="Color 5"/>
                <img class="btn-hover"  src="assets/tex/Buttons/colorBH5.png" alt="Color 5 active"/>
            </button>
            <button class="texture-btn" data-texture="5">
                <img class="btn-normal" src="assets/tex/Buttons/colorB6.png"  alt="Color 6"/>
                <img class="btn-hover"  src="assets/tex/Buttons/colorBH6.png" alt="Color 6 active"/>
            </button>
            <button class="texture-btn" data-texture="6">
                <img class="btn-normal" src="assets/tex/Buttons/colorB7.png"  alt="Color 7"/>
                <img class="btn-hover"  src="assets/tex/Buttons/colorBH7.png" alt="Color 7 active"/>
            </button>
            <button class="texture-btn" data-texture="7">
                <img class="btn-normal" src="assets/tex/Buttons/colorB8.png"  alt="Color 8"/>
                <img class="btn-hover"  src="assets/tex/Buttons/colorBH8.png" alt="Color 8 active"/>
            </button>
        </div>
    </div>

    <script type="module" src="index.js?v=7"></script>
</body>

</html>
